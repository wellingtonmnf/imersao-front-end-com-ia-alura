<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Netflix</h1>
    </header>

    <main>
        <section aria-labelledby="profiles-title">
            <h2 id="profiles-title">Quem está assistindo?</h2>
            <div class="profiles">
                <article class="profile" role="button" tabindex="0">
                    <figure>
                        <img src="/assets/perfil-01.png" alt="Um home branco, sobrevivente pós-apocalíptico robusto com barba, com um respirador tático pendurado no pescoço e uma jaqueta de lona desgastada em uma cidade em ruínas.">
                        <figcaption>Wellington</figcaption>
                    </figure>
                </article>
                <article class="profile" role="button" tabindex="0">
                    <figure>
                        <img src="/assets/perfil-02.png" alt="Uma mulher branca, detetive de polícia dos anos 40 de aparência séria com cabelo curto cacheado e blazer de tweed em um escritório enfumaçado.">
                        <figcaption>Milena</figcaption>
                    </figure>
                </article>
                <article class="profile" role="button" tabindex="0">
                    <figure>
                        <img src="/assets/perfil-03.png" alt="Um homem branco idoso de barba branca longa, túnica rústica e aparência de mago em uma caverna de cristais, focado em contemplação.">
                        <figcaption>João Vitor</figcaption>
                    </figure>
                </article>
                <article class="profile" role="button" tabindex="0">
                    <figure>
                        <img src="/assets/perfil-04.png" alt="Uma mulher negra jovem, piloto de combate do futuro com cabelo trançado e traje tático avançado no cockpit escuro de uma nave espacial.">
                        <figcaption>Maria Eduarda</figcaption>
                    </figure>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Netflix</p>
    </footer>
</body>
</html>
