<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheap Chain Channel</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js" defer></script>
</head>

<body>
    <header>
        <h1>Cheap Chain Channel</h1>
        <button id="theme-toggle" aria-label="Alternar tema">🌙</button>
    </header>

    <main>
        <section aria-labelledby="profiles-title">
            <h2 id="profiles-title">Quem está assistindo?</h2>
            <ul class="profiles-wrapper" aria-label="Lista de perfis">
                <li>
                    <ol class="profiles" aria-label="Perfil por ordem" id="profiles-list">
                        <!-- perfis serão gerados dinamicamente via JavaScript -->
                    </ol>
                </li>
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Netflix</p>
    </footer>
</body>

</html>
